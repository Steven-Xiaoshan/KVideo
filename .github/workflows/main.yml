name: Auto Sync Fork with Upstream

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动同步一次
  workflow_dispatch:      # 允许你手动点运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        uses: tgymnich/fork-sync@v2.0  # 最新稳定版
        with:
          owner: KuekHaoYang
          repo: KVideo
          base: main
          head: main
          merge_method: merge
          auto_approve: true
          token: ${{ secrets.GITHUB_TOKEN }}
